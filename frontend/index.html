<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Анализ транспорта — Веб-приложение</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <aside id="sidebar" class="sidebar-open">
        <div class="sidebar-header">
          <h1>🚗 Анализ транспорта</h1>
          <button id="toggleSidebar" class="btn-toggle" title="Свернуть/Развернуть панель">
            <span class="icon-chevron-left">‹</span>
          </button>
        </div>

        <div class="sidebar-content">
          <div class="section">
            <h2 class="section-title">Загрузка данных</h2>
            <div class="control-group">
              <label for="fileInput" class="file-label">
                <span class="file-icon">📁</span>
                <span class="file-text">Выберите GeoJSON файл</span>
                <input type="file" id="fileInput" accept=".geojson,.json" />
              </label>
            </div>
          </div>

          <div class="section">
            <h2 class="section-title">Параметры анализа</h2>
            
            <div class="control-group">
              <label for="start">Начало периода</label>
              <input type="datetime-local" id="start" />
            </div>

            <div class="control-group">
              <label for="end">Конец периода</label>
              <input type="datetime-local" id="end" />
            </div>

            <div class="control-group checkbox-group">
              <label for="include_zero" class="checkbox-label">
                <input type="checkbox" id="include_zero" checked />
                <span>Включать нулевые скорости</span>
              </label>
            </div>

            <div class="control-group">
              <label for="speed_thresh" class="tooltip" data-tooltip="Порог скорости для определения заторов">
                Порог скорости (км/ч)
              </label>
              <input type="number" id="speed_thresh" value="8" min="0" step="0.1" />
            </div>

            <div class="control-group">
              <label for="eps" class="tooltip" data-tooltip="Радиус кластеризации в метрах">
                Радиус кластера (м)
              </label>
              <input type="number" id="eps" value="50" min="10" step="10" />
            </div>

            <div class="control-group">
              <label for="min_pts" class="tooltip" data-tooltip="Минимальное количество точек для кластера">
                Мин. точек в кластере
              </label>
              <input type="number" id="min_pts" value="4" min="1" step="1" />
            </div>
          </div>

          <div class="section">
            <h2 class="section-title">Действия</h2>
            <div class="btn-group-vertical">
              <button id="analyzeBtn" class="btn btn-primary btn-block">
                <span id="analyzeBtnText">Анализировать</span>
                <span id="analyzeBtnLoader" class="loading" style="display: none;"></span>
              </button>
              <div class="btn-group-horizontal">
                <button id="exportBtn" class="btn btn-secondary" disabled>
                  💾 Экспорт
                </button>
                <button id="clearBtn" class="btn btn-secondary">
                  🗑️ Очистить
                </button>
              </div>
            </div>
            
            <!-- Progress Bar -->
            <div id="progressContainer" style="display: none; margin-top: 1rem;">
              <div class="progress-bar-wrapper">
                <div class="progress-bar">
                  <div id="progressBar" class="progress-bar-fill"></div>
                </div>
                <div id="progressText" class="progress-text">0%</div>
              </div>
              <div id="progressStage" class="progress-stage"></div>
            </div>
          </div>

          <div class="section" id="visualizationSection" style="display: none;">
            <h2 class="section-title">Визуализация</h2>
            <div class="control-group">
              <label class="radio-group">
                <input type="radio" name="visualizationMode" value="points" checked />
                <span>Точки</span>
              </label>
              <label class="radio-group">
                <input type="radio" name="visualizationMode" value="heatmap" />
                <span>Тепловая карта</span>
              </label>
            </div>
          </div>

          <div class="section">
            <h2 class="section-title">Диагностика</h2>
            <button id="diagnoseBtn" class="btn btn-secondary btn-block">
              🔍 Проверить данные
            </button>
            <div id="diagnosticResults" style="display: none; margin-top: 1rem;"></div>
          </div>

          <div class="section" id="statsSection" style="display: none;">
            <h2 class="section-title">Статистика</h2>
            <div id="stats">
              <div class="stat-card">
                <div class="stat-label">Средняя скорость</div>
                <div class="stat-value" id="avg">—</div>
              </div>
              <div class="stat-card success">
                <div class="stat-label">Всего точек</div>
                <div class="stat-value" id="count">—</div>
              </div>
              <div class="stat-card warning">
                <div class="stat-label">Отброшено</div>
                <div class="stat-value" id="dropped">—</div>
              </div>
              <div class="stat-card">
                <div class="stat-label">Макс. скорость</div>
                <div class="stat-value" id="maxSpeed">—</div>
              </div>
              <div class="stat-card">
                <div class="stat-label">Мин. скорость</div>
                <div class="stat-value" id="minSpeed">—</div>
              </div>
              <div class="stat-card">
                <div class="stat-label">Расстояние</div>
                <div class="stat-value" id="totalDistance">—</div>
              </div>
            </div>
          </div>

          <div class="section" id="filters" style="display: none;">
            <h2 class="section-title">Фильтр по скорости</h2>
            <div class="filter-container">
              <div class="filter-range">
                <div class="range-input-group">
                  <label>От (км/ч)</label>
                  <input type="range" id="speedFilterMin" min="0" max="100" value="0" step="1" />
                  <span class="range-display" id="speedFilterMinDisplay">0</span>
                </div>
                <div class="range-input-group">
                  <label>До (км/ч)</label>
                  <input type="range" id="speedFilterMax" min="0" max="100" value="100" step="1" />
                  <span class="range-display" id="speedFilterMaxDisplay">100</span>
                </div>
              </div>
              <div class="filter-actions">
                <button id="applyFilterBtn" class="btn btn-primary btn-block">Применить</button>
                <button id="resetFilterBtn" class="btn btn-secondary btn-block">Сбросить</button>
              </div>
            </div>
          </div>
        </div>
      </aside>

      <main id="main-content">
        <div id="map"></div>
        <div id="chartWrap">
          <div class="chart-header">
            <h3>График скорости</h3>
          </div>
          <canvas id="speedChart"></canvas>
        </div>
      </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <script src="script.js"></script>
  </body>
</html>
